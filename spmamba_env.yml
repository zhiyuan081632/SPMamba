name: spmamba
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - setuptools
  - wheel
  - ninja
  - cmake
  - packaging

  # Install PyTorch with CUDA before pip native extensions.
  # This avoids ctcdecode/mamba-style setup failures caused by missing torch.
  - pytorch=2.0.0
  - pytorch-cuda=11.8

  - numpy=1.24.*
  - scipy=1.10.*
  - pandas
  - tqdm
  - pyyaml

  - pip:
      # PyTorch companion package. Use CUDA 11.8 wheel to match conda PyTorch.
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torchaudio==2.0.1+cu118

      # Training / evaluation framework
      - pytorch-lightning==2.0.2
      - torchmetrics==0.11.4
      - torch-complex==0.4.3
      - torch-mir-eval==0.4
      - fast-bss-eval==0.1.4
      - torch-optimizer==0.3.0
      - speechbrain==0.5.14
      - typeguard==2.13.3

      # Audio and utilities
      - soundfile==0.12.1
      - librosa==0.9.2
      - rich==13.3.5
      - wandb==0.15.1
      - einops==0.7.0
      - transformers==4.38.2
      - ptflops==0.7
      - matplotlib

      # Intentionally omitted from env-create pip phase:
      # - ctcdecode: not used by SPMamba and blocks env creation on Python 3.9.
      # - causal-conv1d / mamba-ssm: install after activation once torch import is verified.
